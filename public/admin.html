<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FIT4LESS Admin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/supabase-js/2.39.0/supabase-js.umd.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;700&display=swap");
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #080c10;
        --surface: #0f1419;
        --card: #141b22;
        --border: #1e2832;
        --accent: #00d4aa;
        --orange: #ff7043;
        --text: #e8edf2;
        --muted: #4a5568;
        --light: #8899aa;
        --font: "Barlow Condensed", Impact, sans-serif;
        --body: "DM Sans", "Segoe UI", sans-serif;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--body);
        min-height: 100vh;
      }

      /* ── Login ── */
      #login-screen {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
      }
      .logo {
        font-family: var(--font);
        font-size: 36px;
        font-weight: 900;
        color: var(--accent);
        margin-bottom: 6px;
      }
      .logo-sub {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 32px;
      }
      .login-box {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 28px;
        width: 100%;
        max-width: 360px;
        border-top: 2px solid var(--accent);
      }
      .login-box h2 {
        font-family: var(--font);
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 20px;
      }
      input {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
        color: var(--text);
        font-size: 14px;
        font-family: var(--body);
        outline: none;
        margin-bottom: 10px;
      }
      input::placeholder {
        color: var(--muted);
      }
      .btn {
        width: 100%;
        background: var(--accent);
        border: none;
        border-radius: 8px;
        padding: 13px;
        color: #000;
        font-size: 14px;
        font-weight: 700;
        font-family: var(--body);
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn:hover {
        background: #00ffcc;
        box-shadow: 0 0 20px #00d4aa55;
      }
      .btn.ghost {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--light);
      }
      .btn.ghost:hover {
        background: var(--surface);
        box-shadow: none;
      }
      .btn.small {
        padding: 7px 14px;
        width: auto;
        font-size: 12px;
      }
      .error {
        color: var(--orange);
        font-size: 13px;
        margin-bottom: 10px;
      }

      /* ── Admin layout ── */
      #admin-screen {
        display: none;
      }
      .topbar {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 16px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .topbar-title {
        font-family: var(--font);
        font-size: 24px;
        font-weight: 900;
        color: var(--accent);
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
      }
      .main {
        padding: 28px;
        max-width: 1100px;
        margin: 0 auto;
      }

      /* ── Stats bar ── */
      .stats-bar {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        margin-bottom: 28px;
      }
      .stat-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 18px 16px;
        border-top: 2px solid var(--accent);
      }
      .stat-val {
        font-family: var(--font);
        font-size: 34px;
        font-weight: 900;
        color: var(--accent);
        line-height: 1;
      }
      .stat-label {
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      /* ── User table ── */
      .section-title {
        font-family: var(--font);
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 14px;
        color: var(--text);
      }
      .search-bar {
        width: 100%;
        max-width: 320px;
        margin-bottom: 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        color: var(--text);
        font-size: 13px;
        font-family: var(--body);
        outline: none;
      }
      .user-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 12px;
        overflow: hidden;
        transition: border-color 0.2s;
      }
      .user-card:hover {
        border-color: #2a3a4a;
      }
      .user-row {
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        gap: 12px;
      }
      .user-avatar {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        flex-shrink: 0;
        background: linear-gradient(135deg, var(--accent), var(--orange));
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font);
        font-size: 18px;
        font-weight: 900;
        color: #000;
      }
      .user-info {
        flex: 1;
        min-width: 0;
      }
      .user-name {
        font-weight: 700;
        font-size: 15px;
        color: var(--text);
      }
      .user-email {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .user-meta {
        display: flex;
        gap: 16px;
        align-items: center;
        flex-shrink: 0;
      }
      .meta-item {
        text-align: right;
      }
      .meta-val {
        font-family: var(--font);
        font-size: 20px;
        font-weight: 800;
        color: var(--text);
      }
      .meta-label {
        color: var(--muted);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      /* ── Log detail ── */
      .log-detail {
        border-top: 1px solid var(--border);
        padding: 16px 20px;
        display: none;
      }
      .log-detail.open {
        display: block;
      }
      .log-entry {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .log-type {
        font-family: var(--font);
        font-size: 18px;
        font-weight: 800;
      }
      .log-meta {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }
      .status-badge {
        border-radius: 99px;
        font-size: 11px;
        font-weight: 700;
        padding: 3px 10px;
        white-space: nowrap;
      }
      .chevron {
        color: var(--muted);
        font-size: 18px;
        transition: transform 0.2s;
        margin-left: 8px;
      }
      .chevron.open {
        transform: rotate(180deg);
      }

      /* ── Ex breakdown ── */
      .ex-list {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .ex-item {
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 6px;
        padding: 7px 10px;
        font-size: 12px;
      }
      .ex-check {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        font-weight: 900;
      }
      .progress-bar-wrap {
        background: #0a0e12;
        border-radius: 99px;
        height: 4px;
        overflow: hidden;
        margin-top: 8px;
      }
      .progress-bar-fill {
        height: 100%;
        border-radius: 99px;
        transition: width 0.4s;
      }

      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid var(--border);
        border-top: 3px solid var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 40px auto;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .empty {
        text-align: center;
        padding: 40px;
        color: var(--muted);
        font-size: 14px;
      }

      @media (max-width: 700px) {
        .stats-bar {
          grid-template-columns: 1fr 1fr;
        }
        .user-meta {
          gap: 10px;
        }
        .main {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ── Login Screen ── -->
    <div id="login-screen">
      <div class="logo">FIT4LESS</div>
      <div class="logo-sub">Admin Panel</div>
      <div class="login-box">
        <h2>🔐 Admin Login</h2>
        <input
          type="text"
          id="sb-url"
          placeholder="https://sqfjvhustlyqlnwutmua.supabase.co"
        />
        <input
          type="password"
          id="sb-service"
          placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxZmp2aHVzdGx5cWxud3V0bXVhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzE5NDcwNiwiZXhwIjoyMDg4NzcwNzA2fQ.8mfDlpRFLTmgXHXtJm13-tjw4b0ou-ei-qHm6E5AWyg"
        />
        <input
          type="password"
          id="admin-pass"
          placeholder="fit4less_admin_2024"
        />
        <div class="error" id="login-err" style="display: none"></div>
        <button class="btn" onclick="doLogin()">Sign In →</button>
        <p
          style="
            color: var(--muted);
            font-size: 11px;
            margin-top: 14px;
            line-height: 1.6;
          "
        >
          Service role key is in Supabase → Settings → API.<br />
          Never share this key or put it in your main app.
        </p>
      </div>
    </div>

    <!-- ── Admin Screen ── -->
    <div id="admin-screen">
      <div class="topbar">
        <div class="topbar-title">⚡ FIT4LESS Admin</div>
        <div class="topbar-right">
          <span id="admin-email"></span>
          <button class="btn ghost small" onclick="doLogout()">Sign Out</button>
        </div>
      </div>

      <div class="main">
        <!-- Stats -->
        <div class="stats-bar">
          <div class="stat-card">
            <div class="stat-val" id="stat-users">—</div>
            <div class="stat-label">Total Users</div>
          </div>
          <div class="stat-card" style="border-top-color: var(--orange)">
            <div
              class="stat-val"
              style="color: var(--orange)"
              id="stat-sessions"
            >
              —
            </div>
            <div class="stat-label">Total Sessions</div>
          </div>
          <div class="stat-card" style="border-top-color: #8b5cf6">
            <div class="stat-val" style="color: #8b5cf6" id="stat-exercises">
              —
            </div>
            <div class="stat-label">Exercises Logged</div>
          </div>
          <div class="stat-card" style="border-top-color: #f59e0b">
            <div class="stat-val" style="color: #f59e0b" id="stat-active">
              —
            </div>
            <div class="stat-label">Active Today</div>
          </div>
        </div>

        <!-- Users -->
        <div
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 8px;
          "
        >
          <div class="section-title">👥 Users & Workouts</div>
          <button class="btn ghost small" onclick="loadData()">
            ↺ Refresh
          </button>
        </div>
        <input
          class="search-bar"
          type="text"
          placeholder="Search by name or email…"
          oninput="filterUsers(this.value)"
        />
        <div id="users-list"><div class="spinner"></div></div>
      </div>
    </div>

    <script>
      const ADMIN_PASSWORD = "fit4less_admin_2024"; // Change this!
      let sbClient = null;
      let allUsers = [];
      let allLogs = [];
      let openUser = null;

      // ── Login ──────────────────────────────────────────────────────────────────
      async function doLogin() {
        const url = document.getElementById("sb-url").value.trim();
        const svcKey = document.getElementById("sb-service").value.trim();
        const pass = document.getElementById("admin-pass").value.trim();
        const errEl = document.getElementById("login-err");

        if (pass !== ADMIN_PASSWORD) {
          errEl.textContent = "Incorrect admin password.";
          errEl.style.display = "block";
          return;
        }
        if (!url.startsWith("https://") || !svcKey.startsWith("eyJ")) {
          errEl.textContent = "Invalid Supabase URL or service key.";
          errEl.style.display = "block";
          return;
        }

        errEl.style.display = "none";
        sbClient = supabase.createClient(url, svcKey, {
          auth: { autoRefreshToken: false, persistSession: false },
        });

        document.getElementById("login-screen").style.display = "none";
        document.getElementById("admin-screen").style.display = "block";
        document.getElementById("admin-email").textContent = "Admin";
        loadData();
      }

      function doLogout() {
        sbClient = null;
        allUsers = [];
        allLogs = [];
        document.getElementById("login-screen").style.display = "flex";
        document.getElementById("admin-screen").style.display = "none";
        document.getElementById("sb-service").value = "";
        document.getElementById("admin-pass").value = "";
      }

      // ── Load data ──────────────────────────────────────────────────────────────
      async function loadData() {
        document.getElementById("users-list").innerHTML =
          '<div class="spinner"></div>';

        // Fetch profiles + workout logs in parallel
        const [profilesRes, logsRes] = await Promise.all([
          sbClient
            .from("profiles")
            .select("*")
            .order("created_at", { ascending: false }),
          sbClient
            .from("workout_logs")
            .select("*")
            .order("logged_at", { ascending: false }),
        ]);

        allUsers = profilesRes.data || [];
        allLogs = logsRes.data || [];

        // Stats
        const today = new Date().toISOString().split("T")[0];
        const activeToday = new Set(
          allLogs
            .filter((l) => l.logged_at.startsWith(today))
            .map((l) => l.user_id)
        ).size;
        const totalEx = allLogs.reduce(
          (a, l) => a + (l.exercises_done || 0),
          0
        );

        document.getElementById("stat-users").textContent = allUsers.length;
        document.getElementById("stat-sessions").textContent = allLogs.length;
        document.getElementById("stat-exercises").textContent = totalEx;
        document.getElementById("stat-active").textContent = activeToday;

        renderUsers(allUsers);
      }

      // ── Render ─────────────────────────────────────────────────────────────────
      function renderUsers(users) {
        const el = document.getElementById("users-list");
        if (!users.length) {
          el.innerHTML = '<div class="empty">No users found.</div>';
          return;
        }

        el.innerHTML = users
          .map((u) => {
            const userLogs = allLogs.filter((l) => l.user_id === u.id);
            const totalMins = userLogs.reduce(
              (a, l) => a + (l.duration_mins || 0),
              0
            );
            const lastSeen = userLogs[0]
              ? new Date(userLogs[0].logged_at).toLocaleDateString("en-US", {
                  month: "short",
                  day: "numeric",
                })
              : "Never";

            return `
      <div class="user-card" id="card-${u.id}">
        <div class="user-row" onclick="toggleUser('${u.id}')">
          <div class="user-avatar">${(u.name || "?")[0].toUpperCase()}</div>
          <div class="user-info">
            <div class="user-name">${u.name || "Unknown"}</div>
            <div class="user-email">${u.id}</div>
          </div>
          <div class="user-meta">
            <div class="meta-item">
              <div class="meta-val">${userLogs.length}</div>
              <div class="meta-label">Sessions</div>
            </div>
            <div class="meta-item">
              <div class="meta-val">${totalMins}</div>
              <div class="meta-label">Mins</div>
            </div>
            <div class="meta-item" style="min-width:60px">
              <div class="meta-val" style="font-size:13px;color:var(--muted)">${lastSeen}</div>
              <div class="meta-label">Last Active</div>
            </div>
          </div>
          <div class="chevron" id="chev-${u.id}">▾</div>
        </div>
        <div class="log-detail" id="detail-${u.id}">
          ${renderUserLogs(userLogs)}
        </div>
      </div>`;
          })
          .join("");
      }

      function renderUserLogs(logs) {
        if (!logs.length)
          return '<div class="empty" style="padding:20px">No workouts logged yet.</div>';

        const EMOJI = {
          Push: "💪",
          Pull: "🏋️",
          Legs: "🦵",
          Core: "🔥",
          Cardio: "🏃",
          Olympic: "🥇",
        };
        const COLOR = {
          Push: "#00D4AA",
          Pull: "#FF7043",
          Legs: "#8B5CF6",
          Core: "#F59E0B",
          Cardio: "#EC4899",
          Olympic: "#3B82F6",
        };

        return logs
          .map((log) => {
            const exList = log.completed_exercises || [];
            const done = exList.filter((e) => e.completed).length;
            const pct = exList.length
              ? Math.round((done / exList.length) * 100)
              : null;
            const color = COLOR[log.type] || "#00D4AA";
            const emoji = EMOJI[log.type] || "⚡";
            const date = new Date(log.logged_at).toLocaleDateString("en-US", {
              weekday: "short",
              month: "short",
              day: "numeric",
              hour: "2-digit",
              minute: "2-digit",
            });

            const statusLabel =
              pct === null
                ? ""
                : pct === 100
                ? "Complete"
                : pct >= 50
                ? "Partial"
                : "Incomplete";
            const statusColor =
              pct === 100 ? "#00D4AA" : pct >= 50 ? "#FF7043" : "#EF4444";

            const exRows = exList
              .map(
                (ex) => `
        <div class="ex-item" style="background:${
          ex.completed ? "#00D4AA10" : "#EF444408"
        };border:1px solid ${ex.completed ? "#00D4AA33" : "#EF444422"}">
          <div class="ex-check" style="background:${
            ex.completed ? "#00D4AA" : "transparent"
          };border:2px solid ${
                  ex.completed ? "#00D4AA" : "#EF4444"
                };color:#000">
            ${ex.completed ? "✓" : ""}
          </div>
          <span style="flex:1;color:${
            ex.completed ? "#E8EDF2" : "#4A5568"
          };text-decoration:${ex.completed ? "none" : "line-through"}">${
                  ex.name
                }</span>
          <span style="color:#4A5568">${ex.sets}×${ex.reps}</span>
          ${
            !ex.completed
              ? '<span style="color:#EF4444;font-size:10px;font-weight:700">SKIPPED</span>'
              : ""
          }
        </div>`
              )
              .join("");

            return `
      <div class="log-entry" style="flex-direction:column;align-items:stretch">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${
          exList.length ? 8 : 0
        }px">
          <div>
            <div class="log-type" style="color:${color}">${emoji} ${
              log.type
            }</div>
            <div class="log-meta">${date} · ${log.duration_mins}m · ${
              exList.length || log.exercises_done
            } exercises</div>
          </div>
          ${
            pct !== null
              ? `
            <span class="status-badge" style="background:${statusColor}20;border:1px solid ${statusColor}55;color:${statusColor}">
              ${statusLabel} · ${pct}%
            </span>`
              : ""
          }
        </div>
        ${
          exList.length
            ? `
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${pct}%;background:${
                pct === 100
                  ? "linear-gradient(90deg,#00D4AA,#00FF88)"
                  : `linear-gradient(90deg,${statusColor},${statusColor}88)`
              }"></div>
          </div>
          <div class="ex-list">${exRows}</div>
        `
            : ""
        }
      </div>`;
          })
          .join("");
      }

      function toggleUser(id) {
        const detail = document.getElementById(`detail-${id}`);
        const chev = document.getElementById(`chev-${id}`);
        const isOpen = detail.classList.contains("open");
        // Close all others
        document
          .querySelectorAll(".log-detail.open")
          .forEach((el) => el.classList.remove("open"));
        document
          .querySelectorAll(".chevron.open")
          .forEach((el) => el.classList.remove("open"));
        if (!isOpen) {
          detail.classList.add("open");
          chev.classList.add("open");
        }
      }

      function filterUsers(query) {
        const q = query.toLowerCase();
        const filtered = allUsers.filter(
          (u) =>
            (u.name || "").toLowerCase().includes(q) ||
            (u.id || "").toLowerCase().includes(q)
        );
        renderUsers(filtered);
      }

      // Enter key on password
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });
    </script>
  </body>
</html>
